<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MapControl</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <div class="grid">

          <!-- Левая: форма -->
          <div class="col col--form">
            <input id="title" class="input input--title" type="text" placeholder="Заголовок" />
            <textarea id="desc" class="textarea textarea--grow" placeholder="Описание"></textarea>

            <div class="coords-row">
              <div class="input-prefix">
                <span class="prefix-tag">шир</span>
                <input id="lat" class="input input--prefix" inputmode="decimal" placeholder="55.9151725" />
              </div>
              <div class="input-prefix">
                <span class="prefix-tag">дол</span>
                <input id="lng" class="input input--prefix" inputmode="decimal" placeholder="57.8706878" />
              </div>
            </div>

            <label class="file-row">
              <input id="images" type="file" multiple accept="image/*" class="file-input" />
              <span class="btn btn--file">Фото…</span>
              <span id="imagesInfo" class="file-info muted sm">Файлы не выбраны</span>
            </label>
            <div class="hint">JPG/PNG/HEIC → WebP, max 2048px · 80%</div>

            <div class="actions">
              <button class="btn" id="btnSaveDraft" type="button">Сохранить</button>
              <button class="btn btn--primary" id="btnCheck" type="button">Проверить (LLM)</button>
              <button class="btn btn--good" id="btnSubmit" type="button" disabled>Отправить</button>
            </div>

            <div id="msg" class="msg"></div>
          </div>

          <!-- Правая: карта + diff -->
          <div class="col col--map">
            <div class="mapWrap">
              <div class="mapHeader">
                <span class="mapHeader__hint muted">клик — поставить маркер</span>
                <span class="pill" id="envStatus">ENV…</span>
              </div>
              <div id="map" class="map"></div>
            </div>

            <div class="card card--sub">
              <div class="llm-head">
                <span class="muted sm" id="llmMeta"></span>
              </div>
              <div class="diff">
                <div class="diff__col">
                  <div class="diff__label">Ваш вариант</div>
                  <pre id="diffOriginal" class="diff__box"></pre>
                </div>
                <div class="diff__col">
                  <div class="diff__label">Предлагает ИИ</div>
                  <pre id="diffSuggested" class="diff__box"></pre>
                </div>
              </div>
              <div class="row row--tight">
                <button class="btn" id="btnApplySuggested" type="button" disabled>Принять правки</button>
                <button class="btn" id="btnKeepMine" type="button" disabled>Оставить мой</button>
              </div>
              <ul id="llmWarnings" class="warnings"></ul>
            </div>
          </div>

        </div>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
