<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MapControl</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">

        <!-- Шапка карточки -->
        <div class="card-head">
          <div class="brand">
            <div class="brand__logo">MC</div>
            <span class="brand__title">MapControl</span>
            <span class="brand__sep">/</span>
            <span class="brand__sub">Новая заявка</span>
          </div>
          <span class="pill" id="envStatus">ENV…</span>
        </div>

        <div class="grid">

          <!-- Левая: форма -->
          <div class="col">
            <input id="title" class="input input--title" type="text"
              placeholder="Заголовок — например: Дом из газобетона, д. Мокино" />
            <textarea id="desc" class="textarea" rows="4"
              placeholder="Описание — например: Свая 89/300, 25 шт., длина 2000 мм"></textarea>

            <div class="coords-row">
              <div class="input-prefix">
                <span class="prefix-tag">шир</span>
                <input id="lat" class="input input--prefix" inputmode="decimal" placeholder="55.9151725" />
              </div>
              <div class="input-prefix">
                <span class="prefix-tag">дол</span>
                <input id="lng" class="input input--prefix" inputmode="decimal" placeholder="57.8706878" />
              </div>
            </div>

            <input id="images" class="input" type="file" multiple accept="image/*" />
            <div class="hint">JPG/PNG/HEIC → WebP, max 2048px · 80%</div>
            <div id="imagesInfo" class="muted sm"></div>

            <div class="actions">
              <button class="btn" id="btnSaveDraft" type="button">Сохранить</button>
              <button class="btn btn--primary" id="btnCheck" type="button">Проверить (LLM)</button>
              <button class="btn btn--good" id="btnSubmit" type="button" disabled>Отправить</button>
            </div>

            <div id="msg" class="msg"></div>
          </div>

          <!-- Правая: карта + diff -->
          <div class="col">
            <div class="mapWrap">
              <div class="mapHeader">
                <span class="mapHeader__title">Место на карте</span>
                <span class="mapHeader__hint muted">Клик — поставить маркер</span>
              </div>
              <div id="map" class="map"></div>
            </div>

            <div class="card card--sub">
              <div class="llm-head">
                <span class="muted sm" id="llmMeta"></span>
              </div>
              <div class="diff">
                <div class="diff__col">
                  <div class="diff__label">Ваш вариант</div>
                  <pre id="diffOriginal" class="diff__box"></pre>
                </div>
                <div class="diff__col">
                  <div class="diff__label">Предлагает ИИ</div>
                  <pre id="diffSuggested" class="diff__box"></pre>
                </div>
              </div>
              <div class="row row--tight">
                <button class="btn" id="btnApplySuggested" type="button" disabled>Принять правки</button>
                <button class="btn" id="btnKeepMine" type="button" disabled>Оставить мой</button>
              </div>
              <ul id="llmWarnings" class="warnings"></ul>
            </div>
          </div>

        </div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
